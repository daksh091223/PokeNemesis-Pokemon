<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéNemesis - Register</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container auth-container">
        <h1>⚔️ POKÉNEMESIS ⚔️</h1>
        <p class="subtitle">Create your trainer account</p>

        <div class="auth-box">
            <h2>NEW TRAINER</h2>
            <!-- FIX: No <form> tag — prevents page reload on Enter/submit -->
            <div class="form-group">
                <label>USERNAME</label>
                <input type="text" id="username" placeholder="Choose a username" autocomplete="username">
            </div>
            <div class="form-group">
                <label>PASSWORD</label>
                <input type="password" id="password" placeholder="Min. 4 characters" autocomplete="new-password">
            </div>
            <button id="registerBtn" class="btn-primary">▶ REGISTER</button>
            <div id="message" class="error-msg"></div>
            <div id="success-msg" class="success-msg"></div>
            <p class="auth-link">Already a trainer? <a href="/login">Login here</a></p>
        </div>
    </div>

    <script>
        document.getElementById('password').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doRegister();
        });
        document.getElementById('username').addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doRegister();
        });
        document.getElementById('registerBtn').addEventListener('click', doRegister);

        async function doRegister() {
            const btn = document.getElementById('registerBtn');
            const msg = document.getElementById('message');
            const successMsg = document.getElementById('success-msg');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;

            msg.innerText = '';
            successMsg.innerText = '';

            if (!username || !password) {
                msg.innerText = 'Please fill in all fields.';
                return;
            }
            if (password.length < 4) {
                msg.innerText = 'Password must be at least 4 characters.';
                return;
            }

            btn.disabled = true;
            btn.innerText = 'LOADING...';

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();
                if (res.ok) {
                    successMsg.innerText = 'Account created! Redirecting...';
                    setTimeout(() => window.location.href = '/login', 1200);
                } else {
                    msg.innerText = data.error || 'Registration failed.';
                    btn.disabled = false;
                    btn.innerText = '▶ REGISTER';
                }
            } catch (err) {
                msg.innerText = 'Connection error. Is the server running?';
                btn.disabled = false;
                btn.innerText = '▶ REGISTER';
            }
        }
    </script>
</body>
</html>
